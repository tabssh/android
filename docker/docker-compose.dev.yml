# TabSSH Android — development container.
#
# Convention: this file mounts ONLY runtime-mutable state as volumes
# (source bind-mount, gradle cache, emulator AVD data). Build-time
# content (Android SDK, JDK, gradle binary) lives in the Dockerfile's
# rootfs. Don't add a `/opt/android-sdk` volume here — it shadows the
# baked-in SDK with an empty directory on first run.

services:
  tabssh-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: tabssh-android-dev:latest
    volumes:
      # Source — bind-mount so local edits show up in the container.
      - ../:/workspace
      # Gradle user home — named volume so dependency cache survives
      # `compose down` but doesn't leak into the host.
      - gradle-cache:/root/.gradle
      # NOTE: NO `android-sdk` volume here. The SDK is baked into the
      # image rootfs by Dockerfile.dev — mounting a volume on top
      # would shadow it.
    working_dir: /workspace
    environment:
      - ANDROID_HOME=/opt/android-sdk
      - GRADLE_USER_HOME=/root/.gradle
    command: /bin/bash
    stdin_open: true
    tty: true
    networks:
      - tabssh-dev-network

  # Optional emulator service. Off by default (profile: with-emulator)
  # because it needs --privileged + KVM and isn't useful for headless
  # CI builds.
  tabssh-emulator:
    image: thyrlian/android-sdk
    container_name: tabssh-emulator
    privileged: true
    volumes:
      - ../:/workspace
      # AVD + emulator state — volume because it's runtime data.
      - emulator-data:/root/.android
    environment:
      - ANDROID_HOME=/opt/android-sdk
      - EMULATOR_DEVICE=Nexus_5X_API_30
    command: |
      bash -c "
      sdkmanager 'system-images;android-30;google_apis;x86_64' &&
      avdmanager create avd -n test_device -k 'system-images;android-30;google_apis;x86_64' -d 'Nexus 5X' &&
      emulator -avd test_device -no-window -no-audio
      "
    networks:
      - tabssh-dev-network
    profiles:
      - with-emulator

volumes:
  gradle-cache:
    driver: local
  emulator-data:
    driver: local

networks:
  tabssh-dev-network:
    driver: bridge
