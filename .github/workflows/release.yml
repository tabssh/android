name: Production Release

# ─────────────────────────────────────────────────────────────────────────
# RELEASE CHANNEL: ver (versioned / stable)
#
# Fires on push of a `v*` tag (e.g. v0.0.9, v1.0.0). Builds + signs +
# uploads APKs as a non-prerelease GitHub release. The release tag IS
# the version source of truth — filenames carry no version suffix.
#
# This is one of two user-facing release channels. The other is `dev`
# (`.github/workflows/development-builds.yml`) which produces prerelease
# builds named `devel-{commit}` on every push to develop branches.
#
# `mosh-binaries.yml` produces a third channel that is build-infra only:
# its releases are marked prerelease and don't appear on the repo's main
# page — they're consumed at build time by `scripts/fetch-mosh-binaries.sh`.
# ─────────────────────────────────────────────────────────────────────────

on:
  push:
    tags:
      - 'v*'

# Group by tag ref — re-pushing the same tag cancels any in-flight rebuild
# for that tag, but distinct version tags pushed back-to-back each get to
# complete and publish their own release.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    name: Build & Publish Release
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        api-level: 34
        build-tools: 34.0.0
        cmake: 3.22.1
        
    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
    
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Decode and setup keystore
      run: |
        echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > keystore.jks
        echo "✅ Keystore decoded and ready"
        
    - name: Run all tests
      run: ./gradlew test --no-daemon
      
    - name: Run security scan
      run: ./gradlew dependencyCheckAnalyze --no-daemon
      
    - name: Verify test coverage
      run: ./gradlew jacocoTestReport jacocoTestCoverageVerification --no-daemon
      
    - name: Get release version
      id: version
      run: |
        # Extract tag name and remove 'v' prefix if present
        TAG_NAME=${GITHUB_REF#refs/tags/}
        VERSION=${TAG_NAME#v}

        echo "TAG_NAME=$TAG_NAME" >> $GITHUB_OUTPUT
        echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
        echo "RELEASE_NAME=tabssh-android-arm64" >> $GITHUB_OUTPUT

        echo "📦 Building release for tag: $TAG_NAME"
        echo "📦 Version: $VERSION"
        
    - name: Fetch latest mosh-client binaries
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        # Pulls latest mosh-X.Y.Z release assets from this repo and drops
        # them into app/src/main/jniLibs/<abi>/libmosh-client.so. Won't fail
        # the build if no release exists yet (workflow `mosh-binaries.yml`
        # publishes them on a monthly cadence).
        chmod +x scripts/fetch-mosh-binaries.sh
        TABSSH_REPO="${{ github.repository }}" scripts/fetch-mosh-binaries.sh

    - name: Build release APK
      run: ./gradlew assembleRelease
      env:
        RELEASE_BUILD: true
        
    - name: Process multi-architecture APKs
      run: |
        cd app/build/outputs/apk/release/
        echo "🏗️ Processing architecture-specific APKs..."

        # build.gradle already outputs the unified release name —
        # tabssh-android-{arch}.apk, where arch is the simplified tag:
        # arm64 / arm / amd64 / x86 / universal.
        # No version suffix in the filename — the GitHub release tag
        # carries the version, and assets-by-tag are unique per release.
        ls -lh tabssh-android-*.apk
        
    - name: Build F-Droid compatible APK (sanity check, not uploaded)
      run: |
        # Smoke test: ensure proguard-fdroid.pro and the fdroidRelease build
        # type still build successfully. F-Droid distributes via their own
        # build infrastructure (cloning the source, building on F-Droid
        # servers, signing with F-Droid keys), so we never upload the APK
        # ourselves — uploading our-key-signed F-Droid builds to GitHub
        # would just be a confusing duplicate that nobody can use.
        ./gradlew assembleFdroidRelease --no-daemon
        echo "✅ F-Droid build succeeded — proguard-fdroid.pro is healthy"
        ls -lh app/build/outputs/apk/fdroidRelease/*.apk

    - name: Generate release notes
      run: |
        echo "# TabSSH ${{ steps.version.outputs.VERSION }} - Complete Mobile SSH Client" > RELEASE_NOTES.md
        echo "" >> RELEASE_NOTES.md
        echo "🎉 **Complete 1.0.0 Feature Set - Everything Included!**" >> RELEASE_NOTES.md
        echo "" >> RELEASE_NOTES.md
        echo "## 📦 Downloads" >> RELEASE_NOTES.md
        echo "- **tabssh-android-arm64.apk** - ARM64 release (recommended for most devices)" >> RELEASE_NOTES.md
        echo "- **tabssh-android-arm.apk** - ARM release (older devices)" >> RELEASE_NOTES.md
        echo "- **tabssh-android-amd64.apk** - x86_64 release (emulators, Chromebooks)" >> RELEASE_NOTES.md
        echo "- **tabssh-android-x86.apk** - x86 32-bit release" >> RELEASE_NOTES.md
        echo "- **tabssh-android-universal.apk** - Universal (works on any device)" >> RELEASE_NOTES.md
        echo "" >> RELEASE_NOTES.md
        cat CHANGELOG.md >> RELEASE_NOTES.md
        
    - name: Generate SHA checksums
      run: |
        echo "🔐 Generating SHA256 checksums for security verification..."

        cd app/build/outputs/apk/release/
        sha256sum tabssh-android-*.apk > tabssh-android-checksums.sha256

        echo "## 🔐 Release APK Checksums" >> ../../../../../RELEASE_NOTES.md
        echo "\`\`\`" >> ../../../../../RELEASE_NOTES.md
        cat tabssh-android-checksums.sha256 >> ../../../../../RELEASE_NOTES.md
        echo "\`\`\`" >> ../../../../../RELEASE_NOTES.md
        echo "" >> ../../../../../RELEASE_NOTES.md
        echo "**Verify downloads**: \`sha256sum -c tabssh-android-checksums.sha256\`" >> ../../../../../RELEASE_NOTES.md

    - name: Delete existing release if exists
      continue-on-error: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        echo "🗑️ Checking for existing release: ${{ steps.version.outputs.TAG_NAME }}"

        # Try to delete the release (both with and without 'v' prefix)
        gh release delete ${{ steps.version.outputs.TAG_NAME }} --yes || echo "Release ${{ steps.version.outputs.TAG_NAME }} not found"
        gh release delete v${{ steps.version.outputs.VERSION }} --yes || echo "Release v${{ steps.version.outputs.VERSION }} not found"
        gh release delete ${{ steps.version.outputs.VERSION }} --yes || echo "Release ${{ steps.version.outputs.VERSION }} not found"

        echo "✅ Cleanup complete, ready to create new release"

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        name: "TabSSH ${{ steps.version.outputs.VERSION }} - Complete Mobile SSH Client"
        files: |
          app/build/outputs/apk/release/tabssh-android-arm64.apk
          app/build/outputs/apk/release/tabssh-android-arm.apk
          app/build/outputs/apk/release/tabssh-android-amd64.apk
          app/build/outputs/apk/release/tabssh-android-x86.apk
          app/build/outputs/apk/release/tabssh-android-universal.apk
          app/build/outputs/apk/release/tabssh-android-checksums.sha256
          app/build/outputs/mapping/release/mapping.txt
          RELEASE_NOTES.md
          metadata/io.github.tabssh.yml
        body_path: RELEASE_NOTES.md
        generate_release_notes: false
        prerelease: false
        draft: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Prepare F-Droid submission package
      run: |
        # F-Droid clones the source and builds on its own infrastructure;
        # what they actually need from us is the metadata file + a working
        # source tree. Bundle those plus a reference APK (the unrenamed
        # artifact from `assembleFdroidRelease`) for submission review.
        mkdir -p fdroid-submission
        cp app/build/outputs/apk/fdroidRelease/tabssh-android-arm64.apk \
           fdroid-submission/tabssh-android-arm64-fdroid-reference.apk
        cp metadata/io.github.tabssh.yml fdroid-submission/
        cp README.md fdroid-submission/
        cp CHANGELOG.md fdroid-submission/
        echo "F-Droid submission package ready in fdroid-submission/"
        echo "Manual F-Droid submission required - package prepared."
        
    - name: Notify community
      run: |
        # Send release notifications
        ./scripts/notify-release.sh "${{ github.ref_name }}"
      env:
        MATRIX_TOKEN: ${{ secrets.MATRIX_TOKEN }}
        MASTODON_TOKEN: ${{ secrets.MASTODON_TOKEN }}