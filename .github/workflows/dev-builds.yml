name: Development Build

# ─────────────────────────────────────────────────────────────────────────
# RELEASE CHANNEL: dev (development / pre-release)
#
# Fires on every push to a development branch. Builds debug APKs, marks
# them prerelease, overwrites the rolling `development` tag. Release name
# is `devel-{shortsha}` (no version number — versions are reserved for
# the `ver` channel). Filenames are `tabssh-android-{arch}-dev.apk`.
#
# This is one of two user-facing release channels. The other is `ver`
# (`.github/workflows/release.yml`) which fires on `v*` tags and produces
# the unsuffixed stable APKs.
#
# Mosh refreshes (`mosh-binaries.yml`) are also published as prerelease
# so they don't claim the repo's "Latest" badge — those are build infra,
# not user downloads.
# ─────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [ main, master, devel, develop ]

# Only one development build per ref at a time — cancel any in-flight run
# when a newer push arrives so we don't race on the rolling `development`
# release tag.
concurrency:
  group: dev-build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  # Pull-only, fail-fast gate: the build runs inside this image, so if it is
  # missing we stop immediately rather than provisioning a toolchain inline.
  ensure-build-image:
    name: Ensure build image
    runs-on: ubuntu-latest
    permissions:
      packages: read
    outputs:
      image: ${{ steps.pull.outputs.image }}
    steps:
    - name: Log in to GitHub Container Registry
      uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - id: pull
      name: Pull build image (fail fast if missing)
      run: |
        IMAGE="ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}:build"
        if ! docker pull "$IMAGE"; then
          echo "::error::Build image $IMAGE not found."
          echo "::error::Trigger the 'Build Toolchain Image' workflow (workflow_dispatch) to create it."
          exit 1
        fi
        echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

  build-devel:
    name: Build Development APKs
    needs: ensure-build-image
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: read
    container:
      image: ${{ needs.ensure-build-image.outputs.image }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    steps:
    - name: Checkout code
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4 (node24-ready)
      with:
        fetch-depth: 0

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Decode and setup keystore
      env:
        KEYSTORE_B64: ${{ secrets.KEYSTORE_BASE64 }}
        # Default to the legacy password so the ephemeral keystore matches the
        # build.gradle fallback; if a KEYSTORE_PASSWORD secret is later added it
        # is used for both, keeping the generated keystore and gradle in sync.
        KEYSTORE_PW: ${{ secrets.KEYSTORE_PASSWORD }}
      run: |
        # KEYSTORE_BASE64 is optional for dev builds. When set, decode it
        # so APKs are signed with the real release key (required for OTA
        # updates). When absent (e.g. a fork or first-time contributor),
        # generate an ephemeral self-signed keystore so the build doesn't
        # fail — the APK will be installable but won't match production
        # signatures (install via `adb install -r` or fresh install).
        if [ -n "$KEYSTORE_B64" ]; then
          echo "$KEYSTORE_B64" | base64 -d > keystore.jks
          echo "✅ Keystore decoded from KEYSTORE_BASE64 secret"
        else
          echo "⚠️  KEYSTORE_BASE64 not set — generating ephemeral self-signed keystore for dev build"
          EPHEMERAL_PW="${KEYSTORE_PW:-tabssh123}"
          keytool -genkeypair \
            -keystore keystore.jks \
            -alias tabssh \
            -keyalg RSA \
            -keysize 2048 \
            -validity 365 \
            -storepass "$EPHEMERAL_PW" \
            -keypass "$EPHEMERAL_PW" \
            -dname "CN=TabSSH Dev Build, OU=Dev, O=TabSSH, L=Unknown, ST=Unknown, C=US" \
            -noprompt
          echo "✅ Ephemeral debug keystore generated"
        fi

    - name: Compute development version label
      id: version
      run: |
        # Dev builds don't carry the real release version — that lives in
        # `release.txt` and is reserved for actual stable / pre-release
        # tags via release.yml. Slamming `1.0.0-{commit}` onto every push
        # made dev builds look like real 1.0.0 releases on the GH releases
        # page, which was confusing.
        #
        # Use a fixed `devel` label and append the short commit so the
        # release title still uniquely identifies the build:
        #
        #   tag:           development          (overwritten on each push)
        #   release name:  devel-{commit}       (e.g. devel-8d267f6)
        #   "Version:" md: devel
        VERSION_NAME="devel"
        COMMIT_HASH=$(git rev-parse --short HEAD)
        RELEASE_TITLE="${VERSION_NAME}-${COMMIT_HASH}"

        echo "VERSION_NAME=${VERSION_NAME}" >> $GITHUB_OUTPUT
        echo "COMMIT_HASH=${COMMIT_HASH}" >> $GITHUB_OUTPUT
        echo "RELEASE_TITLE=${RELEASE_TITLE}" >> $GITHUB_OUTPUT

        echo "📦 Building dev release: ${RELEASE_TITLE}"

    - name: Fetch latest mosh-client binaries
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        # Pulls latest mosh-X.Y.Z release assets from this repo and drops
        # them into app/src/main/jniLibs/<abi>/libmosh-client.so. Won't fail
        # the build if no release exists yet (workflow `mosh-binaries.yml`
        # publishes them on a monthly cadence).
        chmod +x scripts/fetch-mosh-binaries.sh
        TABSSH_REPO="${{ github.repository }}" scripts/fetch-mosh-binaries.sh

    - name: Fetch Nerd Fonts
      run: |
        chmod +x scripts/fetch-fonts.sh
        scripts/fetch-fonts.sh

    - name: Build debug APKs
      run: ./gradlew assembleDebug --no-daemon
      env:
        # Passed through so a future KEYSTORE_PASSWORD / KEY_PASSWORD secret is
        # picked up automatically. When absent GitHub expands to an empty string
        # and build.gradle falls back to the current password — which matches the
        # ephemeral keystore generated in the "Decode and setup keystore" step.
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

    - name: Rename APKs with -dev suffix
      run: |
        cd app/build/outputs/apk/debug/

        # build.gradle already outputs the unified naming as
        # tabssh-android-{arch}.apk (where arch is the simplified tag:
        # arm64 / arm / amd64 / x86 / universal). All we do here is append
        # the -dev marker before the extension so dev builds stand apart
        # from stable releases on the GitHub releases page.
        for apk in tabssh-android-*.apk; do
          [[ -e "$apk" ]] || continue
          base="${apk%.apk}"
          cp "$apk" "${base}-dev.apk"
        done

        echo "📱 APKs renamed:"
        ls -lh tabssh-android-*-dev.apk

    - name: Generate checksums
      run: |
        cd app/build/outputs/apk/debug/
        sha256sum tabssh-android-*-dev.apk > checksums-dev.sha256

        echo "🔐 SHA256 Checksums:"
        cat checksums-dev.sha256

    - name: Generate release notes
      run: |
        BUILD_DATE=$(date -u +"%Y-%m-%d %H:%M:%S UTC")

        cat > RELEASE_NOTES_DEV.md << EOF
        # TabSSH Development Build

        **⚠️ This is a development/testing build - Not for production use**

        ## Build Information

        - **Version:** ${{ steps.version.outputs.VERSION_NAME }}
        - **Commit:** ${{ steps.version.outputs.COMMIT_HASH }}
        - **Branch:** ${{ github.ref_name }}
        - **Built:** ${BUILD_DATE}

        ## Downloads

        - **tabssh-android-universal-dev.apk** - Recommended (works on all devices)
        - **tabssh-android-arm64-dev.apk** - Modern ARM 64-bit devices
        - **tabssh-android-arm-dev.apk** - Older ARM 32-bit devices
        - **tabssh-android-amd64-dev.apk** - x86_64 (emulators, Chromebooks)
        - **tabssh-android-x86-dev.apk** - x86 32-bit (older emulators)

        ## What's New in This Build

        Latest changes from the \`${{ github.ref_name }}\` branch:

        EOF

        # Add recent commits
        echo "### Recent Commits" >> RELEASE_NOTES_DEV.md
        echo "" >> RELEASE_NOTES_DEV.md
        git log --pretty=format:"- %s (%h)" -10 >> RELEASE_NOTES_DEV.md
        echo "" >> RELEASE_NOTES_DEV.md
        echo "" >> RELEASE_NOTES_DEV.md

        # Add checksums
        echo "## 🔐 SHA256 Checksums" >> RELEASE_NOTES_DEV.md
        echo "" >> RELEASE_NOTES_DEV.md
        echo '```' >> RELEASE_NOTES_DEV.md
        cat app/build/outputs/apk/debug/checksums-dev.sha256 >> RELEASE_NOTES_DEV.md
        echo '```' >> RELEASE_NOTES_DEV.md
        echo "" >> RELEASE_NOTES_DEV.md

        # Add warning
        cat >> RELEASE_NOTES_DEV.md << 'EOF'
        ## ⚠️ Important Notes

        - This is a **development build** for testing purposes
        - May contain bugs or unfinished features
        - Not recommended for production use
        - Replaces previous development build
        - Use official releases for stable versions

        ## Installation

        ```bash
        # Via ADB
        adb install tabssh-android-universal-dev.apk

        # Manual
        1. Download APK to device
        2. Enable "Install from Unknown Sources"
        3. Tap APK to install
        ```

        ## Reporting Issues

        Found a bug? Report it: https://github.com/tabssh/android/issues

        ---

        **Built automatically from commit ${{ steps.version.outputs.COMMIT_HASH }}**
        EOF

    - name: Delete existing development release
      continue-on-error: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        echo "🗑️ Checking for existing development release..."

        # Try to delete the 'development' release
        gh release delete development --yes || echo "No existing development release found"

        # Also delete the tag if it exists
        git push origin :refs/tags/development || echo "No development tag to delete"

    - name: Create development release
      uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        name: "${{ steps.version.outputs.RELEASE_TITLE }}"
        tag_name: development
        files: |
          app/build/outputs/apk/debug/tabssh-android-universal-dev.apk
          app/build/outputs/apk/debug/tabssh-android-arm64-dev.apk
          app/build/outputs/apk/debug/tabssh-android-arm-dev.apk
          app/build/outputs/apk/debug/tabssh-android-amd64-dev.apk
          app/build/outputs/apk/debug/tabssh-android-x86-dev.apk
          app/build/outputs/apk/debug/checksums-dev.sha256
          RELEASE_NOTES_DEV.md
        body_path: RELEASE_NOTES_DEV.md
        prerelease: true
        draft: false

    - name: Build summary
      run: |
        echo "## 🎉 Development Build Complete!" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Version:** ${{ steps.version.outputs.RELEASE_TITLE }}" >> $GITHUB_STEP_SUMMARY
        echo "**Commit:** ${{ steps.version.outputs.COMMIT_HASH }}" >> $GITHUB_STEP_SUMMARY
        echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 📦 APKs Built:" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        cd app/build/outputs/apk/debug/
        for apk in tabssh-android-*-dev.apk; do
          SIZE=$(du -h "$apk" | cut -f1)
          echo "- \`$apk\` ($SIZE)" >> $GITHUB_STEP_SUMMARY
        done
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 🔗 Download:" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "https://github.com/${{ github.repository }}/releases/tag/development" >> $GITHUB_STEP_SUMMARY
